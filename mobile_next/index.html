<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#06101f" />
  <title>WeldVision Mobile X</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="stylesheet" href="/assets/styles.css" />
</head>
<body>
  <div class="ambient a1"></div>
  <div class="ambient a2"></div>
  <main class="shell">
    <section class="hero glass">
      <h1>WeldVision Mobile X</h1>
      <p>Next-gen defect intelligence with explainability and live session insights.</p>
    </section>

    <section class="glass grid">
      <div>
        <label>Threshold <span id="thresholdOut">0.50</span></label>
        <input id="threshold" type="range" min="0.1" max="0.9" step="0.05" value="0.5" />
      </div>
      <div class="toggle-wrap">
        <label class="toggle">
          <input id="xai" type="checkbox" checked />
          <span>Explainability ON</span>
        </label>
      </div>
    </section>

    <section class="glass actions">
      <label class="btn">
        Gallery
        <input id="gallery" type="file" accept="image/*" hidden />
      </label>
      <label class="btn alt">
        Camera
        <input id="camera" type="file" accept="image/*" capture="environment" hidden />
      </label>
      <button class="btn accent" id="analyze">Analyze</button>
    </section>

    <section id="toast" class="glass toast hidden"></section>

    <section class="glass">
      <h2>Input</h2>
      <img id="inputImg" class="preview hidden" alt="input" />
    </section>

    <section class="glass">
      <h2>Defect Overlay</h2>
      <img id="overlayImg" class="preview hidden" alt="overlay" />
    </section>

    <section class="glass">
      <h2>Explainability</h2>
      <img id="xaiImg" class="preview hidden" alt="xai" />
    </section>

    <section class="glass">
      <h2>Summary</h2>
      <div id="summary"></div>
    </section>

    <section class="glass">
      <h2>Confidence Matrix</h2>
      <div id="bars"></div>
    </section>

    <section class="glass">
      <h2>Recent Runs</h2>
      <div id="history"></div>
    </section>
  </main>

  <script src="/assets/app.js"></script>
</body>
</html>
